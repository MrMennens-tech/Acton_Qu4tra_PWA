<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080f10">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Qu4tro — Binaire Editie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --bg: #080f10;
    --surf1: #0c1a1e;
    --teal-glow: #23bdd8;
  }
  body {
    background-color: var(--bg);
    color: white;
    font-family: 'Figtree', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3, .condensed { font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; }
  
  .glass-panel {
    background: var(--surf1);
    border: 1px solid rgba(35, 189, 216, 0.2);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
  }
  
  .btn-primary {
    background: linear-gradient(135deg, #145668 0%, #0d3540 100%);
    border: 1px solid var(--teal-glow);
    transition: all 0.2s;
  }
  .btn-primary:active { transform: scale(0.98); background: #0d3540; }
  .btn-primary:disabled { opacity: 0.5; border-color: #555; pointer-events: none; }
  
  #logBox {
    font-family: monospace;
    font-size: 0.8rem;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .log-tx { color: #23bdd8; }
  .log-rx { color: #a8dde6; }
  .log-err { color: #ff5555; }
  .log-ok { color: #55ff55; }
  .log-warn { color: #f59e0b; }
</style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

  <!-- Header -->
  <header class="w-full max-w-md mt-4 mb-4 flex justify-between items-center">
    <div>
      <h1 class="text-3xl font-bold tracking-wider text-white">QU4TRO</h1>
      <p class="text-xs text-gray-400">BINAIRE PROTOCOL TOOL V2</p>
    </div>
    <div id="statusDot" class="w-4 h-4 rounded-full bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.8)]"></div>
  </header>

  <!-- Connection Options -->
  <div class="w-full max-w-md mb-4 flex flex-col gap-2">
    <label class="text-xs text-[#23bdd8] font-bold condensed tracking-widest">KIES ZOEKMETHODE (CHROME FIX):</label>
    <select id="scanMethod" class="w-full bg-black border border-gray-700 rounded-lg px-3 py-3 text-sm text-white focus:outline-none focus:border-[#23bdd8]">
      <option value="prefix">Zoek op naam (begint met BQ...)</option>
      <option value="service">Zoek op BLE Service (FFE0)</option>
      <option value="all">Toon alle apparaten (acceptAllDevices)</option>
    </select>
  </div>

  <!-- Main Connect Button -->
  <button id="btnConnect" class="btn-primary w-full max-w-md rounded-xl py-4 text-xl font-bold tracking-widest shadow-[0_0_15px_rgba(35,189,216,0.2)] mb-6">
    VERBIND MET BOARD
  </button>

  <!-- Dashboard Tools -->
  <main class="w-full max-w-md flex flex-col gap-4">
    
    <!-- Custom Hex Sender -->
    <div class="glass-panel p-5 rounded-2xl flex flex-col gap-3">
      <h2 class="text-lg font-bold text-[#23bdd8] condensed tracking-widest">STUUR BINAIR COMMANDO (HEX)</h2>
      
      <div class="flex gap-2">
        <input id="hexInput" type="text" placeholder="53 53 ... 53 45" class="w-full bg-black border border-gray-700 rounded-lg px-3 py-2 text-sm text-[#23bdd8] font-mono focus:outline-none focus:border-[#23bdd8]">
        <button id="btnSendHex" class="bg-[#1b8fa8] hover:bg-[#23bdd8] text-black font-bold px-4 py-2 rounded-lg transition-colors">ZEND</button>
      </div>
      
      <div class="grid grid-cols-2 gap-2 mt-2">
        <button onclick="sendQuickCommand('53 53 00 01 53 45')" class="bg-gray-800 py-2 rounded-lg font-semibold text-xs border border-gray-700 hover:border-white">LICHT AAN (Gok 1)</button>
        <button onclick="sendQuickCommand('53 53 00 00 53 45')" class="bg-gray-800 py-2 rounded-lg font-semibold text-xs border border-gray-700 hover:border-white">LICHT UIT (Gok 1)</button>
        <button onclick="sendQuickCommand('53 53 4D 01 53 45')" class="bg-gray-800 py-2 rounded-lg font-semibold text-xs border border-gray-700 hover:border-white">TEST CMD A</button>
        <button onclick="sendQuickCommand('53 53 33 00 53 45')" class="bg-gray-800 py-2 rounded-lg font-semibold text-xs border border-gray-700 hover:border-white">TEST CMD B</button>
      </div>
    </div>

    <!-- Live Terminal / Log -->
    <div class="glass-panel p-4 rounded-2xl flex-1 flex flex-col min-h-[300px]">
      <div class="flex justify-between items-center mb-2">
        <h2 class="text-lg font-bold text-[#23bdd8] condensed tracking-widest">LIVE DATA LOG</h2>
        <button onclick="clearLog()" class="text-xs text-gray-400 hover:text-white">Wissen</button>
      </div>
      <div id="logBox" class="flex-1 bg-black rounded-lg p-3 overflow-y-auto h-48 border border-gray-800">
        <span class="text-gray-500">Klaar om te verbinden. Zorg dat nRF Connect en DarknessBot volledig AFGESLOTEN zijn!</span><br>
      </div>
    </div>

  </main>

<script>
  // Bluetooth Configuratie
  const SVC_UUID_LONG = '0000ffe0-0000-1000-8000-00805f9b34fb';
  const SVC_UUID_SHORT = 0xFFE0;
  const CHAR_UUID = '0000ffe1-0000-1000-8000-00805f9b34fb';
  
  let bluetoothDevice = null;
  let txRxCharacteristic = null;

  const btnConnect = document.getElementById('btnConnect');
  const logBox = document.getElementById('logBox');
  const statusDot = document.getElementById('statusDot');
  const scanMethod = document.getElementById('scanMethod');

  // --- LOGGING ---
  function log(msg, type = '') {
    const el = document.createElement('div');
    const time = new Date().toLocaleTimeString('nl-NL', { hour12: false, fractionalSecondDigits: 3 }).slice(0,-1);
    el.textContent = `[${time}] ${msg}`;
    if (type) el.className = `log-${type}`;
    logBox.appendChild(el);
    logBox.scrollTop = logBox.scrollHeight;
  }
  function clearLog() { logBox.innerHTML = ''; }

  // --- BLUETOOTH CONNECTIE ---
  btnConnect.addEventListener('click', async () => {
    if (bluetoothDevice && bluetoothDevice.gatt.connected) {
      bluetoothDevice.gatt.disconnect();
      return;
    }

    try {
      log('Controleer of andere apps (nRF) afgesloten zijn...', 'warn');
      log('Vraag permissie en zoek BLE apparaten...', 'ok');
      
      const method = scanMethod.value;
      let options = {};

      if (method === 'prefix') {
        options = {
          filters: [{ namePrefix: 'BQ' }],
          optionalServices: [SVC_UUID_LONG, SVC_UUID_SHORT]
        };
      } else if (method === 'service') {
        options = {
          filters: [{ services: [SVC_UUID_SHORT] }],
          optionalServices: [SVC_UUID_LONG]
        };
      } else {
        options = {
          acceptAllDevices: true,
          optionalServices: [SVC_UUID_LONG, SVC_UUID_SHORT]
        };
      }

      bluetoothDevice = await navigator.bluetooth.requestDevice(options);

      log('Apparaat gevonden: ' + (bluetoothDevice.name || 'Onbekend'), 'ok');
      bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnected);

      log('Verbinden met GATT server...', 'ok');
      const server = await bluetoothDevice.gatt.connect();

      log('Service ophalen...', 'ok');
      // Probeer eerst de lange, val terug op korte indien nodig
      const service = await server.getPrimaryService(SVC_UUID_LONG).catch(() => server.getPrimaryService(SVC_UUID_SHORT));

      log('Karakteristiek ophalen...', 'ok');
      txRxCharacteristic = await service.getCharacteristic(CHAR_UUID);

      await txRxCharacteristic.startNotifications();
      txRxCharacteristic.addEventListener('characteristicvaluechanged', handleNotifications);

      log('✅ Verbonden en luisteren naar inkomende data!', 'ok');
      updateUIState(true);

    } catch (error) {
      log('Fout bij verbinden: ' + error.message, 'err');
      updateUIState(false);
    }
  });

  function onDisconnected() {
    log('❌ Verbinding verbroken.', 'err');
    updateUIState(false);
  }

  function updateUIState(isConnected) {
    if (isConnected) {
      btnConnect.textContent = 'VERBREEK VERBINDING';
      btnConnect.classList.replace('from-[#145668]', 'from-red-900');
      btnConnect.classList.replace('to-[#0d3540]', 'to-red-700');
      statusDot.classList.replace('bg-red-500', 'bg-green-500');
      statusDot.classList.replace('shadow-[0_0_10px_rgba(239,68,68,0.8)]', 'shadow-[0_0_10px_rgba(34,197,94,0.8)]');
    } else {
      btnConnect.textContent = 'VERBIND MET BOARD';
      btnConnect.classList.replace('from-red-900', 'from-[#145668]');
      btnConnect.classList.replace('to-red-700', 'to-[#0d3540]');
      statusDot.classList.replace('bg-green-500', 'bg-red-500');
      statusDot.classList.replace('shadow-[0_0_10px_rgba(34,197,94,0.8)]', 'shadow-[0_0_10px_rgba(239,68,68,0.8)]');
      txRxCharacteristic = null;
    }
  }

  // --- INKOMENDE DATA (RX) ---
  function handleNotifications(event) {
    const value = event.target.value;
    const bytes = new Uint8Array(value.buffer);
    const hexString = Array.from(bytes).map(b => b.toString(16).padStart(2, '0').toUpperCase()).join('-');
    log('RX: ' + hexString, 'rx');
  }

  // --- UITGAANDE DATA (TX) ---
  async function sendBinaryData(hexString) {
    if (!txRxCharacteristic) {
      log('Niet verbonden!', 'err');
      return;
    }

    const cleanHex = hexString.replace(/[^0-9A-Fa-f]/g, '');
    
    if (cleanHex.length === 0 || cleanHex.length % 2 !== 0) {
      log('Ongeldige hexadecimale invoer.', 'err');
      return;
    }

    const bytesArray = new Uint8Array(cleanHex.length / 2);
    for (let i = 0; i < cleanHex.length; i += 2) {
      bytesArray[i / 2] = parseInt(cleanHex.substr(i, 2), 16);
    }

    try {
      await txRxCharacteristic.writeValueWithoutResponse(bytesArray);
      const formatLog = Array.from(bytesArray).map(b => b.toString(16).padStart(2, '0').toUpperCase()).join('-');
      log('TX: ' + formatLog, 'tx');
    } catch (error) {
      log('Fout bij zenden: ' + error.message, 'err');
    }
  }

  document.getElementById('btnSendHex').addEventListener('click', () => {
    sendBinaryData(document.getElementById('hexInput').value);
  });

  function sendQuickCommand(hex) {
    log('Probeer commando: ' + hex, '');
    sendBinaryData(hex);
  }
</script>
</body>
</html>

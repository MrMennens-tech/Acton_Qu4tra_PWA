<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080f10">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Qu4tro — Mennens.Tech</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── Reset ──────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --teal-deep:   #0d3540;
  --teal-mid:    #145668;
  --teal-bright: #1b8fa8;
  --teal-glow:   #23bdd8;
  --teal-pale:   #a8dde6;
  --bg:          #080f10;
  --surf1:       #0c1a1e;
  --surf2:       #102228;
  --surf3:       #163038;
  --border:      #1a3840;
  --border2:     #1f4d5a;
  --text:        #e4f2f5;
  --text-mid:    #7ab5bf;
  --text-dim:    #3a6870;
  --live:        #23bdd8;
  --amber:       #f0a020;
  --red:         #e84040;
  --green:       #22c97a;
  --f-d: 'Barlow Condensed', sans-serif;
  --f-b: 'Figtree', sans-serif;
}

html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: var(--f-b); overflow-x: hidden; }

/* Subtle teal grid texture */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(27,143,168,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(27,143,168,.025) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none; z-index: 0;
}

.wrap { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 0 48px; }

/* ─── Topbar ──────────────────────────────────────────────────────── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 20px 0; margin-bottom: 24px;
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand-name {
  font-family: var(--f-d); font-weight: 700; font-size: 17px;
  letter-spacing: .06em; line-height: 1; color: var(--text);
}
.brand-sub {
  font-family: var(--f-d); font-weight: 400; font-size: 11px;
  letter-spacing: .2em; color: var(--teal-bright); margin-top: 3px;
}

.status-pill {
  display: flex; align-items: center; gap: 7px;
  background: var(--surf2); border: 1px solid var(--border);
  border-radius: 20px; padding: 7px 14px; transition: all .4s;
}
.status-pill.on { background: rgba(13,53,64,.5); border-color: var(--teal-mid); }
.pulse {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--text-dim); transition: all .4s; flex-shrink: 0;
}
.status-pill.on .pulse {
  background: var(--green);
  box-shadow: 0 0 0 3px rgba(34,201,122,.2), 0 0 10px var(--green);
  animation: hb 2s ease-in-out infinite;
}
@keyframes hb {
  0%,100% { box-shadow: 0 0 0 3px rgba(34,201,122,.2), 0 0 8px var(--green); }
  50%      { box-shadow: 0 0 0 5px rgba(34,201,122,.06), 0 0 18px var(--green); }
}
.status-label {
  font-family: var(--f-d); font-size: 12px; font-weight: 700;
  letter-spacing: .1em; color: var(--text-dim); transition: color .4s;
}
.status-pill.on .status-label { color: var(--green); }

/* ─── Connect button ──────────────────────────────────────────────── */
.connect-area { padding: 0 16px; margin-bottom: 14px; }
.btn-connect {
  width: 100%; padding: 17px; border-radius: 14px;
  background: var(--teal-deep); border: 1.5px solid var(--teal-mid);
  color: var(--teal-pale); font-family: var(--f-d); font-size: 16px;
  font-weight: 700; letter-spacing: .16em; cursor: pointer; transition: all .25s;
  position: relative; overflow: hidden;
}
.btn-connect::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(35,189,216,.18) 0%, transparent 60%);
  opacity: 0; transition: opacity .25s;
}
.btn-connect:hover::after { opacity: 1; }
.btn-connect:disabled { opacity: .45; cursor: not-allowed; }

/* ─── Hero card (speed + battery) ────────────────────────────────── */
.hero {
  margin: 0 16px 12px;
  background: var(--surf1); border: 1px solid var(--border);
  border-radius: 20px; overflow: hidden; position: relative;
}
/* Glow top-right */
.hero::after {
  content: ''; position: absolute; top: -60px; right: -60px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(27,143,168,.1) 0%, transparent 70%);
  pointer-events: none;
}
.hero-body { padding: 22px 22px 18px; }
.hero-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; }

/* Speed */
.spd-lbl {
  font-family: var(--f-d); font-size: 10px; font-weight: 700;
  letter-spacing: .24em; color: var(--teal-bright); margin-bottom: 0;
}
.spd-row { display: flex; align-items: baseline; gap: 6px; }
.spd-val {
  font-family: var(--f-d); font-size: 78px; font-weight: 800;
  line-height: .88; color: var(--text); letter-spacing: -.02em; transition: color .3s;
}
.spd-unit {
  font-family: var(--f-d); font-size: 18px; font-weight: 400;
  color: var(--text-mid); letter-spacing: .1em; align-self: flex-end; padding-bottom: 10px;
}

/* Battery ring */
.bat-wrap { display: flex; flex-direction: column; align-items: center; }
.bat-ring { position: relative; width: 80px; height: 80px; }
.bat-ring svg { transform: rotate(135deg); }
.bat-center {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.bat-pct { font-family: var(--f-d); font-size: 22px; font-weight: 700; line-height: 1; color: var(--live); }
.bat-unit { font-family: var(--f-d); font-size: 9px; color: var(--text-dim); letter-spacing: .12em; margin-top: 1px; }

/* Speed bar */
.spd-track {
  height: 4px; background: var(--surf3); border-radius: 2px; overflow: visible;
  position: relative; margin-bottom: 6px;
}
.spd-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--teal-mid), var(--teal-glow));
  border-radius: 2px; transition: width .4s cubic-bezier(.4,0,.2,1); position: relative;
}
.spd-fill.live::after {
  content: ''; position: absolute; right: -2px; top: -4px;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--teal-glow); box-shadow: 0 0 10px var(--teal-glow);
}
.spd-limits {
  display: flex; justify-content: space-between;
  font-family: var(--f-d); font-size: 10px; color: var(--text-dim); letter-spacing: .07em;
}

/* Stats strip */
.stats-strip {
  display: grid; grid-template-columns: repeat(4,1fr);
  border-top: 1px solid var(--border);
}
.stat {
  padding: 14px 0 12px; text-align: center;
  border-right: 1px solid var(--border);
}
.stat:last-child { border-right: none; }
.stat-lbl {
  font-family: var(--f-d); font-size: 9px; font-weight: 700;
  letter-spacing: .15em; color: var(--text-dim); margin-bottom: 3px;
}
.stat-val { font-family: var(--f-d); font-size: 18px; font-weight: 700; color: var(--text); line-height: 1; }
.stat-unit { font-family: var(--f-d); font-size: 9px; color: var(--text-dim); margin-left: 1px; }

/* ─── Section cards ────────────────────────────────────────────────── */
.section {
  margin: 0 16px 12px;
  background: var(--surf1); border: 1px solid var(--border);
  border-radius: 16px; padding: 18px 20px;
}
.sec-lbl {
  font-family: var(--f-d); font-size: 10px; font-weight: 700;
  letter-spacing: .24em; color: var(--teal-bright); margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.sec-lbl::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* Mode selector */
.modes { display: flex; gap: 8px; margin-bottom: 10px; }
.mode-btn {
  flex: 1; border-radius: 12px; border: 1.5px solid var(--border);
  background: var(--surf2); cursor: pointer; transition: all .22s;
  overflow: hidden; font-family: inherit; padding: 12px 6px 10px;
}
.mode-btn:disabled { opacity: .35; cursor: not-allowed; }
.mode-icon { font-size: 17px; margin-bottom: 4px; display: block; }
.mode-name {
  font-family: var(--f-d); font-size: 13px; font-weight: 700;
  letter-spacing: .07em; color: var(--text-mid); display: block; transition: color .22s;
}
.mode-btn.m0 { border-color: var(--green); background: rgba(34,201,122,.1); }
.mode-btn.m0 .mode-name { color: var(--green); }
.mode-btn.m1 { border-color: var(--teal-bright); background: rgba(27,143,168,.12); }
.mode-btn.m1 .mode-name { color: var(--teal-glow); }
.mode-btn.m2 { border-color: var(--red); background: rgba(232,64,64,.1); }
.mode-btn.m2 .mode-name { color: var(--red); }
.mode-desc { font-size: 12px; color: var(--text-dim); min-height: 16px; }

/* Lights toggle */
.lights-row { display: flex; justify-content: space-between; align-items: center; }
.lights-state {
  font-family: var(--f-d); font-size: 17px; font-weight: 600;
  letter-spacing: .1em; color: var(--text-dim); transition: color .3s;
}
.lights-state.on { color: #f5d060; }
.toggle {
  width: 56px; height: 30px; border-radius: 15px; position: relative;
  background: var(--surf3); border: 1.5px solid var(--border);
  cursor: pointer; transition: background .3s, border-color .3s;
}
.toggle.on { background: rgba(240,160,32,.15); border-color: var(--amber); }
.toggle:disabled { cursor: not-allowed; opacity: .4; }
.knob {
  position: absolute; top: 3px; left: 3px; width: 22px; height: 22px;
  border-radius: 50%; background: var(--text-dim);
  transition: left .3s cubic-bezier(.4,0,.2,1), background .3s, box-shadow .3s;
}
.toggle.on .knob { left: 28px; background: var(--amber); box-shadow: 0 0 12px rgba(240,160,32,.5); }

/* Disconnect */
.btn-disc {
  display: block; width: calc(100% - 32px); margin: 0 16px 12px;
  padding: 11px; border-radius: 12px; background: transparent;
  border: 1px solid var(--border); color: var(--text-dim);
  font-family: var(--f-d); font-size: 13px; font-weight: 700;
  letter-spacing: .12em; cursor: pointer; transition: border-color .2s, color .2s;
}
.btn-disc:hover { border-color: var(--border2); color: var(--text-mid); }

/* Log */
.log-wrap { margin: 0 16px; background: var(--surf1); border: 1px solid var(--border); border-radius: 16px; padding: 16px 18px; }
.log-entries { max-height: 110px; overflow-y: auto; }
.log-e { font-family: var(--f-d); font-size: 11px; font-weight: 400; color: var(--text-dim); line-height: 2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.log-e.ok  { color: rgba(34,201,122,.75); }
.log-e.err { color: rgba(232,64,64,.75); }
.log-empty { font-size: 12px; color: var(--text-dim); }

/* Warning */
.warn { display: none; margin: 0 16px 12px; background: rgba(240,160,32,.07); border: 1px solid rgba(240,160,32,.25); border-radius: 10px; padding: 10px 14px; font-size: 12px; color: var(--amber); line-height: 1.5; }

/* Footer */
.footer { text-align: center; margin-top: 32px; padding: 0 16px; }
.ft-brand { display: flex; align-items: center; justify-content: center; margin-bottom: 5px; opacity: .35; }
.ft-copy { font-size: 11px; color: var(--text-dim); letter-spacing: .04em; }

/* Animate in */
.fade { animation: fu .4s ease both; }
@keyframes fu { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
.hidden { display: none !important; }
</style>
</head>

<script>
const SVC  = '0000ffe0-0000-1000-8000-00805f9b34fb';
const CHAR = '0000ffe1-0000-1000-8000-00805f9b34fb';
const enc  = new TextEncoder(), dec = new TextDecoder();

const MODES    = ['BEGINNER','NORMAL','PERFORMANCE'];
const DESCS    = ['Max ~15 km/h · Zachte remmen · Veilig voor beginners','Max ~25 km/h · Standaard rijgedrag','Volledig vermogen · Scherpe respons'];
const MAX_V    = [15, 25, 44];
const MODE_CLS = ['m0','m1','m2'];

let device = null, char = null, hbTimer = null;
let curMode = 1, lightsOn = false;

function pkt(fields) {
  return ['AS', ...fields.flatMap(({k,v})=>[k,String(v)]), 'AE'].join(' | ');
}
function parsePkt(s) {
  const p = s.split(' | ').map(x=>x.trim());
  if (p[0]!=='AS'||p[p.length-1]!=='AE') return null;
  const r={};
  for(let i=1;i<p.length-1;i+=2) if(p[i+1]!==undefined) r[p[i]]=p[i+1];
  return r;
}

function log(msg, cls='') {
  const el = document.getElementById('logEl');
  const empty = el.querySelector('.log-empty');
  if (empty) empty.remove();
  const d = document.createElement('div');
  d.className = 'log-e' + (cls?' '+cls:'');
  d.textContent = new Date().toLocaleTimeString('nl-NL') + '  ' + msg;
  el.prepend(d);
  while(el.children.length > 25) el.lastChild.remove();
}

function showDash(yes) {
  document.getElementById('pill').classList.toggle('on', yes);
  document.getElementById('pillLabel').textContent = yes ? 'VERBONDEN' : 'OFFLINE';
  document.getElementById('connectArea').style.display = yes ? 'none' : 'block';
  const show = yes ? '' : 'none';
  ['hero','secMode','secLights'].forEach(id => {
    const el = document.getElementById(id);
    el.style.display = yes ? 'block' : 'none';
    if (yes) el.classList.add('fade');
  });
  document.getElementById('btnDisc').style.display = yes ? 'block' : 'none';
}

function setBattery(pct) {
  const arc = document.getElementById('batArc');
  const txt = document.getElementById('batPct');
  const fill = (pct/100)*150.8;
  const col = pct>50?'#1b8fa8':pct>20?'#f0a020':'#e84040';
  arc.setAttribute('stroke-dasharray',`${fill} 201.1`);
  arc.setAttribute('stroke',col);
  txt.style.color=col;
  txt.textContent=pct;
}

function setSpeed(spd, mode) {
  const max=MAX_V[mode], pct=Math.min(spd/max*100,100);
  document.getElementById('spdVal').textContent=spd.toFixed(1);
  const bar=document.getElementById('spdBar');
  bar.style.width=pct+'%';
  bar.classList.toggle('live', spd>0.5);
  document.getElementById('spdMax').textContent=max+' KM/H MAX';
}

function setMode(idx) {
  curMode=idx;
  for(let i=0;i<3;i++) {
    const b=document.getElementById('mb'+i);
    b.className='mode-btn'+(i===idx?' '+MODE_CLS[i]:'');
  }
  document.getElementById('mDesc').textContent=DESCS[idx];
  setSpeed(parseFloat(document.getElementById('spdVal').textContent)||0, idx);
  sendCmd(pkt([{k:'M',v:MODES[idx]}]));
}

function toggleLights() {
  lightsOn=!lightsOn;
  const t=document.getElementById('lToggle');
  const s=document.getElementById('lState');
  t.classList.toggle('on',lightsOn);
  s.className='lights-state'+(lightsOn?' on':'');
  s.textContent=lightsOn?'AAN  ✦':'UIT';
  sendCmd(pkt([{k:'B7',v:lightsOn?1:0}]));
}

async function sendCmd(packet) {
  if (!char) return;
  try { await char.writeValue(enc.encode(packet)); log('TX: '+packet,'ok'); }
  catch(e) { log('TX fout: '+e.message,'err'); }
}

function onNotify(e) {
  const f = parsePkt(dec.decode(e.target.value));
  if (!f) return;
  if (f.B3) setBattery(parseInt(f.B3));
  if (f.V)  document.getElementById('sVolt').textContent=(parseInt(f.V)/1000).toFixed(1);
  if (f.B1) document.getElementById('sTemp').textContent=parseInt(f.B1);
  if (f.B4) document.getElementById('sDrain').textContent=(parseInt(f.B4)/1000).toFixed(1);
  if (f.R8) document.getElementById('sRange').textContent=(parseInt(f.R8)/1000).toFixed(1);
  if (f.R6) setSpeed(parseInt(f.R6)/26.6, curMode);
  if (f.B6) {
    const m={'0':0,'1':1,'2':2,'BEGINNER':0,'NORMAL':1,'PERFORMANCE':2}[f.B6];
    if (m!==undefined) { curMode=m; setMode(m); }
  }
  if (f.B7) {
    lightsOn=parseInt(f.B7)>0;
    document.getElementById('lToggle').classList.toggle('on',lightsOn);
    const s=document.getElementById('lState');
    s.className='lights-state'+(lightsOn?' on':'');
    s.textContent=lightsOn?'AAN  ✦':'UIT';
  }
}

async function connect() {
  if (!navigator.bluetooth) {
    document.getElementById('warn').style.display='block';
    log('Web Bluetooth niet beschikbaar','err'); return;
  }
  const btn=document.getElementById('btnConnect');
  btn.textContent='◌  VERBINDEN...'; btn.disabled=true;
  log('Scannen naar Qu4tro (BQ...)...');
  try {
    device = await navigator.bluetooth.requestDevice({
      // Show all BLE devices — select BQ451800617 manually from the list
      acceptAllDevices: true,
      optionalServices: [SVC]
    });
    device.addEventListener('gattserverdisconnected', ()=>{
      clearInterval(hbTimer); showDash(false);
      log('Verbinding verbroken','err'); char=null;
      btn.textContent='◎ \u00a0VERBIND VIA BLUETOOTH'; btn.disabled=false;
    });
    const srv = await device.gatt.connect();
    const svc = await srv.getPrimaryService(SVC);
    char = await svc.getCharacteristic(CHAR);
    await char.startNotifications();
    char.addEventListener('characteristicvaluechanged', onNotify);
    showDash(true); setBattery(0); setMode(1);
    log('Verbonden met '+device.name,'ok');
    await sendCmd(pkt([{k:'M',v:'QUERY'}]));
    hbTimer = setInterval(()=>sendCmd(pkt([{k:'M',v:'QUERY'}])), 2000);
  } catch(e) {
    log('Mislukt: '+e.message,'err');
    btn.textContent='◎ \u00a0VERBIND VIA BLUETOOTH'; btn.disabled=false;
  }
}

async function disconnect() {
  clearInterval(hbTimer);
  if (device?.gatt?.connected) device.gatt.disconnect();
  char=null; showDash(false); log('Verbroken');
}

if (!('bluetooth' in navigator)) document.getElementById('warn').style.display='block';
</script>
</body>
